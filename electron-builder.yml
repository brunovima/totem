appId: com.totem.app
productName: TOTEM
directories:
  buildResources: build
icon: build/icon.png
# Inclui todos os arquivos compilados e exclui fontes/configs de desenvolvimento
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!docker/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!Dockerfile'
  - '!docker-compose.yml'
